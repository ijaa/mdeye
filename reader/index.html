<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- CSP must allow the custom scheme mdeye-app: (reader UI) and mdeye-asset: (local images). -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self' mdeye-app:; style-src 'self' mdeye-app: 'unsafe-inline'; img-src 'self' mdeye-app: mdeye-asset: data: blob:; font-src 'self' mdeye-app: data:; connect-src 'none'; frame-src 'none'; base-uri 'none';"
    />
    <title>MDEye</title>
    <link rel="stylesheet" href="styles/themes.css" />
    <link rel="stylesheet" href="styles/reader.css" />
    <link rel="stylesheet" href="styles/hljs.css" />
  </head>
  <body>
    <div id="app">
      <aside id="outline" class="outline" aria-label="Outline"></aside>
      <main id="main">
        <header id="toolbar" class="toolbar">
          <button type="button" id="btn-outline" title="Toggle outline (⌘B)">☰</button>
          <span id="doc-title" class="doc-title">MDEye</span>
          <span class="spacer"></span>
          <select id="theme-select" title="Theme" aria-label="Theme">
            <option value="light">Light</option>
            <option value="dark">Dark</option>
            <option value="sepia">Sepia</option>
            <option value="green">Green</option>
          </select>
        </header>
        <article id="content" class="markdown-body empty">
          <div class="empty-state">
            <h1>MDEye</h1>
            <p>Open a Markdown file to start reading.</p>
            <p class="hint">⌘O open · drag & drop · double-click .md</p>
          </div>
        </article>
      </main>
    </div>
    <!-- Classic (IIFE) script. WKWebView under file:// / custom scheme fails to load
         ESM type=module chunks reliably, so we ship a single classic bundle. -->
    <script src="app.js"></script>
  </body>
</html>
