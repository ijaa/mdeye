name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for dmg name (tag overrides; defaults to App/Info.plist version)"
        required: false
        default: "0.4.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reader/package-lock.json

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version || '0.4.0' }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build reader, app, dmg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-reader.sh
          ./scripts/sync-reader-to-app.sh
          ./scripts/ci-xcodebuild.sh
          ./scripts/package-dmg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdeye-release
          path: |
            build/mdeye.app
            build/mdeye-*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/mdeye-*.dmg
          body: |
            ## MDEye ${{ steps.ver.outputs.version }} (full)

            Full offline pack: **GFM + Mermaid + themes + HTML export**.
            Unsigned self-use build (no Apple Developer signing).

            ### Install
            1. Open the dmg / unzip and drag **mdeye.app** to **Applications**
            2. First launch: **System Settings → Privacy & Security → Open Anyway**
            3. In app: **MDEye → Set as Default Markdown App…**
               - Or Finder: select `.md` → Get Info (`⌘I`) → Open with MDEye → **Change All…**

            ### First open (method B)
            1. Open `MDEye` (if blocked, dismiss the alert)
            2. **System Settings → Privacy & Security**
            3. Find the message that **MDEye** was blocked
            4. Click **Open Anyway**, confirm **Open**

            Then double-click any `.md` file to read.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
