name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for dmg name (tag overrides; defaults to App/Info.plist version)"
        required: false
        default: "0.6.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reader/package-lock.json

      - name: Resolve version
        id: ver
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ github.event.inputs.version || '0.6.0' }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Build reader, app, dmg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-reader.sh
          ./scripts/sync-reader-to-app.sh
          ./scripts/ci-xcodebuild.sh
          ./scripts/package-dmg.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mdeye-release
          path: |
            build/mdeye.app
            build/mdeye-*.dmg

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/mdeye-*.dmg
          body: |
            ## MDEye ${{ steps.ver.outputs.version }}

            完整离线包：**GFM + Mermaid + 四套主题 + PDF 导出**。
            本版本新增工具栏 PDF 快捷按钮，首次启动默认使用 Sepia 主题。
            当前为未签名自用构建（无 Apple Developer 签名）。

            ### 安装
            1. 打开 dmg，将 **mdeye.app** 拖入 **Applications**
            2. 首次启动若被拦截：**系统设置 → 隐私与安全性 → 仍要打开**
            3. 在应用内选择：**MDEye → Set as Default Markdown App…**
               - 或在 Finder 中选择 `.md` → 显示简介（`⌘I`）→ 打开方式 → MDEye → **全部更改…**

            ### 首次打开
            1. 尝试打开 `MDEye`，若被阻止则关闭提示
            2. 打开 **系统设置 → 隐私与安全性**
            3. 找到 MDEye 被阻止的提示
            4. 点击 **仍要打开** 并确认

            完成后可双击任意 `.md` 文件阅读。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
