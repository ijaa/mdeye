name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  reader:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reader/package-lock.json
      - name: Install & build reader
        working-directory: reader
        run: |
          npm ci
          npm test
          npm run build
      - name: Upload reader dist
        uses: actions/upload-artifact@v4
        with:
          name: reader-dist
          path: reader/dist

  mac-app:
    needs: reader
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: reader/package-lock.json

      - name: Build reader & sync into App
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-reader.sh
          ./scripts/sync-reader-to-app.sh

      - name: Show Xcode
        run: xcodebuild -version

      - name: Build macOS app (unsigned)
        run: ./scripts/ci-xcodebuild.sh

      - name: Bundle sanity (icon + universal + no ESM)
        run: |
          chmod +x scripts/*.sh
          APP=build/mdeye.app
          INDEX=$(find "$APP/Contents/Resources" -name index.html | head -n1)
          APPJS=$(find "$APP/Contents/Resources" -name app.js | head -n1)
          ICON=$(find "$APP/Contents/Resources" -maxdepth 1 -name AppIcon.icns | head -n1)
          BIN="$APP/Contents/MacOS/mdeye"
          test -n "$INDEX" && test -n "$APPJS" && test -n "$ICON" && test -x "$BIN"
          test -f "$APP/Contents/Resources/AppIcon.icns"
          ! test -f "$APP/Contents/Resources/Resources/AppIcon.icns" || echo "note: nested icon still present (ignored)"
          ! grep -q 'type="module"' "$INDEX"
          ! head -c 40 "$APPJS" | grep -q '^import'
          grep -q '__mdeye' "$APPJS"
          file "$BIN" | tee /tmp/arch.txt
          grep -q 'x86_64' /tmp/arch.txt
          grep -q 'arm64' /tmp/arch.txt
          echo "bundle OK: classic IIFE + universal + icon"
          du -sh "$APP" "$APPJS" "$ICON"

      - name: Headless render and PDF export selftests
        run: |
          chmod +x scripts/*.sh
          xattr -c build/mdeye.app 2>/dev/null || true
          ./scripts/ci-selftest.sh build/mdeye.app

      - name: Upload mdeye.app
        uses: actions/upload-artifact@v4
        with:
          name: mdeye-app
          path: build/mdeye.app
